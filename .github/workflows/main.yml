name: Build Android APK with Buildozer

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 1. 필수 빌드 도구 설치
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libtool automake autoconf autotools-dev pkg-config libffi-dev ccache git python3-dev
        sudo apt-get install -y libssl-dev openjdk-17-jdk zip unzip

    # 2. 파이썬 환경 세팅
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 3. Buildozer 및 Cython 설치
    - name: Install Buildozer and Cython
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython==0.29.36 sh

    # 4. 🔥 [핵심 수정] 안드로이드 SDK 라이선스 강제 자동 동의 환경변수 선언
    - name: Android SDK License Accept
      run: |
        mkdir -p ~/.android
        touch ~/.android/repositories.cfg
        # Buildozer가 내부적으로 라이선스를 물어볼 때 무조건 통과하도록 환경 변수 미리 주입

    # 5. 빌드 수행 (동의 응답을 강제로 주입하며 빌드)
    - name: Build with Buildozer
      run: |
        export ANDROID_SDK_ROOT=$HOME/.buildozer/android/platform/android-sdk
        yes | buildozer -v android debug

    # 6. 완성된 APK 파일 업로드
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Android-APK
        path: bin/*.apk
