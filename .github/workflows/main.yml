name: Build Android APK with Buildozer

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 1. 의존성 충돌을 피하기 위해 필수 빌드 도구와 libtool, libffi 위주로 간결하게 설치
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libtool automake autoconf autotools-dev pkg-config libffi-dev ccache git python3-dev
        sudo apt-get install -y libssl-dev openjdk-17-jdk zip unzip

    # 2. 안정적인 빌드를 위해 파이썬 환경 세팅
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 3. Buildozer 및 종속성 패키지 설치
    - name: Install Buildozer and Cython
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython==0.29.36 sh

    # 4. 안드로이드 컴파일 타겟 폴더 생성 유연성 확보 및 빌드 수행
    - name: Build with Buildozer
      run: |
        yes | buildozer -v android debug

    # 5. 빌드가 완료된 최종 APK 파일 업로드
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Android-APK
        path: bin/*.apk
