name: Build Android APK with Buildozer

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 1. 필수 컴파일 도구 및 깃허브에 내장된 Java 17 그대로 활용
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libtool automake autoconf autotools-dev pkg-config libffi-dev ccache git python3-dev
        sudo apt-get install -y libssl-dev zip unzip

    # 2. 파이썬 환경 세팅
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 3. Buildozer 및 Cython 설치
    - name: Install Buildozer and Cython
      run: |
        python -m pip install --upgrade pip
        pip install buildozer cython==0.29.36 sh

    # 4. 🔥 [핵심] 깃허브가 이미 가지고 있는 안드로이드 SDK 라이선스에 미리 도장 찍기
    - name: Accept Pre-installed Android SDK Licenses
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

    # 5. 🔥 [핵심] Buildozer에게 새로 다운받지 말고 이미 깔려있는 시스템 SDK 경로를 쓰라고 강제 지시
    - name: Build with Buildozer using System SDK
      run: |
        # Buildozer가 자체 다운로드를 건너뛰고 시스템 SDK를 바라보게 환경변수 주입
        export ANDROID_SDK_ROOT=$ANDROID_HOME
        export ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.2.9519653
    
        
        # 빌드 시작
        yes | buildozer -v android debug

    # 6. 완성된 APK 파일 업로드
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Android-APK
        path: bin/*.apk
# 기존 명령어 뒤에 -f (force) 또는 캐시 클린 옵션을 붙여 찌꺼기를 날려줍니다.
run: buildozer android clean && buildozer -v android debug
# 기존 명령어 뒤에 -f (force) 또는 캐시 클린 옵션을 붙여 찌꺼기를 날려줍니다.
run: buildozer android clean && buildozer -v android debug
